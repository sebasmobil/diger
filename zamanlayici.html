<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Timer Pro 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ==============================
     AGPL v3.0 - © sebasmobil 2026
     ============================== */

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #f0f0ff;
    --text2: rgba(240,240,255,0.5);
    --text3: rgba(240,240,255,0.25);
    --glow: rgba(108,99,255,0.3);
    --ring: rgba(108,99,255,0.15);
    --danger: #ff4757;
    --warning: #ffa502;
    --success: #43e97b;
    --bar-bg: rgba(10,10,15,0.92);
    --bar-border: rgba(255,255,255,0.06);
    --bar-text: rgba(240,240,255,0.55);
  }
  .light {
    --bg: #f0f0f8;
    --surface: #ffffff;
    --surface2: #e8e8f4;
    --border: rgba(0,0,0,0.07);
    --accent: #5a54e8;
    --accent2: #e84b6a;
    --accent3: #22c55e;
    --text: #1a1a2e;
    --text2: rgba(26,26,46,0.5);
    --text3: rgba(26,26,46,0.25);
    --glow: rgba(90,84,232,0.2);
    --ring: rgba(90,84,232,0.1);
    --danger: #e8324a;
    --warning: #f59e0b;
    --success: #22c55e;
    --bar-bg: rgba(240,240,248,0.95);
    --bar-border: rgba(0,0,0,0.06);
    --bar-text: rgba(26,26,46,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    height: 36px;
    background: var(--bar-bg);
    border-bottom: 1px solid var(--bar-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: background 0.4s ease, border-color 0.4s ease;
  }
  #topbar span {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--bar-text);
    transition: color 0.4s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #topbar .sep { opacity: 0.35; }
  #topbar a {
    color: inherit;
    text-decoration: none;
    cursor: pointer;
  }
  #topbar a:hover { color: var(--accent); }

  /* ── BG GRADIENT ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 30% 20%, rgba(108,99,255,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 70% 80%, rgba(255,101,132,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.5s ease;
  }
  .light body::before {
    background: radial-gradient(ellipse 60% 50% at 30% 20%, rgba(90,84,232,0.05) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 70% 80%, rgba(232,75,106,0.04) 0%, transparent 70%);
  }

  /* ── MAIN LAYOUT ── */
  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: 36px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 0;
  }
  .theme-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 18px;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(20deg); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    margin: 20px 24px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 5px;
    gap: 4px;
    transition: background 0.4s ease;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--glow);
    transform: scale(1.02);
  }
  .tab:not(.active):hover { color: var(--text); background: var(--surface2); }

  /* ── MAIN PANEL ── */
  .panel { display: none; flex: 1; flex-direction: column; }
  .panel.active { display: flex; }

  /* ── CLOCK DISPLAY ── */
  .clock-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  /* Ring */
  .ring-container {
    position: relative;
    width: min(280px, 65vw);
    height: min(280px, 65vw);
    margin-bottom: 28px;
  }
  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
    filter: drop-shadow(0 0 12px var(--glow));
  }
  .ring-bg { fill: none; stroke: var(--ring); stroke-width: 3; }
  .ring-fg {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 0;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1),
                stroke 0.4s ease,
                filter 0.4s ease;
  }
  .ring-fg.warning { stroke: var(--warning); filter: drop-shadow(0 0 8px rgba(255,165,2,0.5)); }
  .ring-fg.danger  { stroke: var(--danger);  filter: drop-shadow(0 0 8px rgba(255,71,87,0.5)); animation: pulsering 0.8s ease-in-out infinite; }

  @keyframes pulsering {
    0%,100% { filter: drop-shadow(0 0 8px rgba(255,71,87,0.5)); }
    50%      { filter: drop-shadow(0 0 20px rgba(255,71,87,0.9)); }
  }

  .ring-inner {
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.4s ease;
    overflow: hidden;
  }
  .ring-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(108,99,255,0.05) 0%, transparent 60%);
  }

  .time-display {
    font-family: 'DM Mono', monospace;
    font-size: clamp(34px, 9vw, 56px);
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    transition: color 0.3s ease;
    position: relative;
    z-index: 1;
  }
  .time-display.warning { color: var(--warning); }
  .time-display.danger  { color: var(--danger); animation: pulsetext 0.8s ease-in-out infinite; }
  .time-display.finished { color: var(--success); }

  @keyframes pulsetext {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }

  .time-ms {
    font-family: 'DM Mono', monospace;
    font-size: clamp(14px, 3.5vw, 22px);
    font-weight: 300;
    color: var(--text2);
    margin-top: 4px;
    position: relative; z-index: 1;
  }
  .time-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-top: 6px;
    position: relative; z-index: 1;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 0 24px 20px;
  }
  .btn {
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.04em;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .btn:active::after { opacity: 1; }
  .btn:active { transform: scale(0.95) !important; }

  .btn-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }

  .btn-main {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 8px 32px var(--glow);
  }
  .btn-main:hover { transform: scale(1.1); box-shadow: 0 12px 40px var(--glow); }
  .btn-main.running {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    animation: mainpulse 2s ease-in-out infinite;
  }
  @keyframes mainpulse {
    0%,100% { box-shadow: 0 8px 32px var(--glow); }
    50%      { box-shadow: 0 8px 48px rgba(108,99,255,0.5); }
  }

  /* ── LAPS (stopwatch) ── */
  .laps-section {
    padding: 0 24px;
    max-height: 180px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }
  .laps-section::-webkit-scrollbar { width: 3px; }
  .laps-section::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
  .lap-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-radius: 10px;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    animation: lapIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes lapIn {
    from { opacity: 0; transform: translateX(-12px) scale(0.96); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }
  .lap-num { color: var(--text3); font-size: 11px; }
  .lap-split { color: var(--accent); font-size: 12px; }
  .lap-item.best  { border-color: var(--success); }
  .lap-item.worst { border-color: var(--danger); }

  /* ── TIMER INPUT ── */
  .timer-input-wrap {
    padding: 0 24px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .time-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .time-unit label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
  }
  .time-picker {
    width: 64px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 300;
    text-align: center;
    padding: 12px 0;
    outline: none;
    transition: all 0.3s ease;
    -webkit-appearance: none;
    appearance: none;
  }
  .time-picker:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
  .time-picker:disabled { opacity: 0.4; }
  .colon {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--text3);
    padding-bottom: 20px;
  }

  /* ── PRESETS ── */
  .presets-section {
    padding: 0 24px 20px;
  }
  .presets-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .presets-header h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .btn-add-preset {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
    font-family: 'Syne', sans-serif;
  }
  .btn-add-preset:hover { background: var(--ring); }
  .presets-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .preset-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px 7px 14px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    transition: all 0.25s ease;
    animation: chipIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes chipIn {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  .preset-chip:hover { border-color: var(--accent); color: var(--accent); }
  .preset-chip .del-preset {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text3);
    color: var(--bg);
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .preset-chip .del-preset:hover { background: var(--danger); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    width: 100%;
    max-width: 360px;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.show .modal { transform: translateY(0) scale(1); }
  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .modal p  { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; }
  .btn-modal {
    flex: 1; padding: 13px;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.2s ease;
  }
  .btn-modal.primary  { background: var(--accent); color: #fff; border-color: transparent; box-shadow: 0 4px 16px var(--glow); }
  .btn-modal.secondary { background: var(--surface2); color: var(--text2); }
  .btn-modal:hover { transform: translateY(-1px); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 22px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
    white-space: nowrap;
    max-width: 85vw;
    text-align: center;
    opacity: 0;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── FINISH ANIMATION ── */
  @keyframes finishPop {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.06); }
    60%  { transform: scale(0.98); }
    100% { transform: scale(1); }
  }
  .ring-container.finished { animation: finishPop 0.6s cubic-bezier(0.34,1.56,0.64,1); }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 800;
    animation: particleFly 1.2s ease-out forwards;
  }
  @keyframes particleFly {
    from { opacity: 1; transform: translate(0,0) scale(1); }
    to   { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-height: 700px) {
    .ring-container { width: min(200px, 50vw); height: min(200px, 50vw); margin-bottom: 16px; }
    .laps-section { max-height: 120px; }
    .time-display { font-size: clamp(26px, 8vw, 42px); }
  }
  @media (max-width: 380px) {
    header { padding: 14px 16px 0; }
    .tabs { margin: 14px 16px 0; }
    .timer-input-wrap, .presets-section, .controls { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span>
    Pro 2.0
    <span class="sep">|</span>
    ©sebasmobil 2026
    <span class="sep">|</span>
    <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank">AGPL v3.0</a>
  </span>
</div>

<div id="app">
  <header>
    <div style="font-size:20px; font-weight:800; letter-spacing:-0.02em;">⏱</div>
    <button class="theme-btn" id="themeBtn" title="Tema değiştir">🌙</button>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="timer">Geri Sayım</div>
    <div class="tab" data-tab="stopwatch">Kronometre</div>
  </div>

  <!-- ═══════════════ TIMER PANEL ═══════════════ -->
  <div class="panel active" id="panel-timer">
    <div class="clock-wrap">
      <div class="ring-container" id="timerRingWrap">
        <svg class="ring-svg" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="46"/>
          <circle class="ring-fg" id="timerRing" cx="50" cy="50" r="46"/>
        </svg>
        <div class="ring-inner">
          <div class="time-display" id="timerDisplay">00:00:00</div>
          <div class="time-label" id="timerLabel">HAZIR</div>
        </div>
      </div>
    </div>

    <!-- Input row -->
    <div class="timer-input-wrap" id="timerInputWrap">
      <div class="time-unit">
        <label>sa</label>
        <input class="time-picker" id="tHour" type="number" min="0" max="23" value="0">
      </div>
      <div class="colon">:</div>
      <div class="time-unit">
        <label>dk</label>
        <input class="time-picker" id="tMin" type="number" min="0" max="59" value="5">
      </div>
      <div class="colon">:</div>
      <div class="time-unit">
        <label>sn</label>
        <input class="time-picker" id="tSec" type="number" min="0" max="59" value="0">
      </div>
    </div>

    <!-- Presets -->
    <div class="presets-section">
      <div class="presets-header">
        <h3>Kayıtlı Süreler</h3>
        <button class="btn-add-preset" id="addPresetBtn">+ Kaydet</button>
      </div>
      <div class="presets-list" id="presetsList"></div>
    </div>

    <!-- Controls -->
    <div class="controls" style="padding-bottom:32px;">
      <button class="btn btn-icon" id="timerResetBtn" title="Sıfırla">↺</button>
      <button class="btn btn-main" id="timerStartBtn">▶</button>
      <button class="btn btn-icon" id="timerSoundBtn" title="Ses">🔔</button>
    </div>
  </div>

  <!-- ═══════════════ STOPWATCH PANEL ═══════════════ -->
  <div class="panel" id="panel-stopwatch">
    <div class="clock-wrap">
      <div class="ring-container" id="swRingWrap">
        <svg class="ring-svg" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="46"/>
          <circle class="ring-fg" id="swRing" cx="50" cy="50" r="46"
            style="stroke:var(--accent3); filter:drop-shadow(0 0 12px rgba(67,233,123,0.3))"/>
        </svg>
        <div class="ring-inner">
          <div class="time-display" id="swDisplay">00:00</div>
          <div class="time-ms" id="swMs">.00</div>
          <div class="time-label" id="swLabel">HAZIR</div>
        </div>
      </div>
    </div>

    <!-- Laps -->
    <div class="laps-section" id="lapsList"></div>

    <!-- Controls -->
    <div class="controls" style="padding-bottom:32px;">
      <button class="btn btn-icon" id="swLapBtn" title="Tur">◎</button>
      <button class="btn btn-main" id="swStartBtn" style="background:var(--accent3); box-shadow:0 8px 32px rgba(67,233,123,0.3);">▶</button>
      <button class="btn btn-icon" id="swResetBtn" title="Sıfırla">↺</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Uyarı</h2>
    <p id="modalMsg">Mesaj</p>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/*

 */

/* ──────────────── THEME ──────────────── */
const themeBtn = document.getElementById('themeBtn');
let isDark = true;
themeBtn.addEventListener('click', () => {
  isDark = !isDark;
  document.body.className = isDark ? '' : 'light';
  themeBtn.textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('timerTheme', isDark ? 'dark' : 'light');
});
(function initTheme() {
  const saved = localStorage.getItem('timerTheme');
  if (saved === 'light') { isDark = false; document.body.className = 'light'; themeBtn.textContent = '☀️'; }
})();

/* ──────────────── TABS ──────────────── */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    const name = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  });
});

/* ──────────────── TOAST ──────────────── */
let toastTimer;
function showToast(msg, duration = 2400) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

/* ──────────────── MODAL ──────────────── */
function showModal(title, msg, actions) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  const actEl = document.getElementById('modalActions');
  actEl.innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn-modal ' + (a.primary ? 'primary' : 'secondary');
    b.textContent = a.label;
    b.addEventListener('click', () => { closeModal(); a.fn && a.fn(); });
    actEl.appendChild(b);
  });
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target === document.getElementById('modalOverlay')) closeModal(); });

/* ──────────────── NOTIFICATION & AUDIO ──────────────── */
let notifPermission = false;
(async () => {
  if ('Notification' in window) {
    if (Notification.permission === 'granted') notifPermission = true;
    else if (Notification.permission !== 'denied') {
      const p = await Notification.requestPermission();
      notifPermission = p === 'granted';
    }
  }
})();

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
let soundEnabled = true;
const soundBtn = document.getElementById('timerSoundBtn');
soundBtn.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  soundBtn.textContent = soundEnabled ? '🔔' : '🔕';
  showToast(soundEnabled ? 'Ses açık' : 'Ses kapalı');
});

function playAlarm(duration = 1200) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.18);
      gain.gain.setValueAtTime(0, now + i * 0.18);
      gain.gain.linearRampToValueAtTime(0.3, now + i * 0.18 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.32);
      osc.start(now + i * 0.18);
      osc.stop(now + i * 0.18 + 0.35);
    });
    // Low rumble
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let j = 0; j < data.length; j++) data[j] = (Math.random()*2-1) * 0.05;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.15, now); g2.gain.exponentialRampToValueAtTime(0.001, now+0.4);
    src.connect(g2); g2.connect(ctx.destination);
    src.start(now);
  } catch(e) {}
}

function sendNotification(title, body) {
  if (!notifPermission) return;
  try {
    new Notification(title, { body, icon: '⏱', badge: '⏱', requireInteraction: false, silent: false });
  } catch(e) {}
}

/* ──────────────── PARTICLES ──────────────── */
function burst(x, y, color = '#6c63ff') {
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 / 18) * i;
    const dist = 60 + Math.random() * 60;
    p.style.cssText = `
      left:${x}px; top:${y}px;
      background:${color};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*0.1}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1400);
  }
}

/* ──────────────── RING HELPER ──────────────── */
const CIRC = 2 * Math.PI * 46; // ~289
function setRing(el, pct) {
  const offset = CIRC * (1 - Math.min(1, Math.max(0, pct)));
  el.style.strokeDasharray = CIRC;
  el.style.strokeDashoffset = offset;
}

/* ──────────────── VISIBILITY (background mode) ──────────────── */
let timerHiddenAt = null, swHiddenAt = null;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (timerRunning) timerHiddenAt = Date.now();
    if (swRunning) swHiddenAt = Date.now();
  } else {
    if (timerHiddenAt && timerRunning) {
      const elapsed = Math.floor((Date.now() - timerHiddenAt) / 1000);
      timerRemaining = Math.max(0, timerRemaining - elapsed);
      timerHiddenAt = null;
      if (timerRemaining === 0) finishTimer();
      else updateTimerDisplay();
    }
    if (swHiddenAt && swRunning) {
      swElapsed += Date.now() - swHiddenAt;
      swHiddenAt = null;
      updateSwDisplay();
    }
  }
});

/* ──────────────────────────────────────────
   ════════════ TIMER LOGIC ════════════
   ────────────────────────────────────────── */
let timerTotal = 300, timerRemaining = 300;
let timerRunning = false, timerInterval = null;

const timerDisplay = document.getElementById('timerDisplay');
const timerLabel   = document.getElementById('timerLabel');
const timerRing    = document.getElementById('timerRing');
const timerRingWrap = document.getElementById('timerRingWrap');
const timerStartBtn = document.getElementById('timerStartBtn');
const timerResetBtn = document.getElementById('timerResetBtn');
const tHour = document.getElementById('tHour');
const tMin  = document.getElementById('tMin');
const tSec  = document.getElementById('tSec');

function getTimerInputSeconds() {
  return (+tHour.value||0)*3600 + (+tMin.value||0)*60 + (+tSec.value||0);
}
function setTimerInputDisabled(v) {
  [tHour, tMin, tSec].forEach(el => el.disabled = v);
}
function formatHMS(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function updateTimerDisplay() {
  timerDisplay.textContent = formatHMS(timerRemaining);
  const pct = timerTotal > 0 ? timerRemaining / timerTotal : 0;
  setRing(timerRing, pct);
  timerDisplay.className = 'time-display';
  timerRing.className = 'ring-fg';
  if (pct <= 0.1) {
    timerDisplay.classList.add('danger');
    timerRing.classList.add('danger');
  } else if (pct <= 0.25) {
    timerDisplay.classList.add('warning');
    timerRing.classList.add('warning');
  }
}

function startTimer() {
  timerInterval = setInterval(() => {
    if (document.hidden) return;
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) finishTimer();
  }, 1000);
  timerRunning = true;
  timerStartBtn.textContent = '⏸';
  timerStartBtn.classList.add('running');
  timerLabel.textContent = 'ÇALIŞIYOR';
  setTimerInputDisabled(true);
  document.getElementById('timerInputWrap').style.opacity = '0.4';
}
function pauseTimer() {
  clearInterval(timerInterval); timerInterval = null;
  timerRunning = false;
  timerStartBtn.textContent = '▶';
  timerStartBtn.classList.remove('running');
  timerLabel.textContent = 'DURAKLATILDI';
}
function resetTimer() {
  clearInterval(timerInterval); timerInterval = null;
  timerRunning = false;
  timerRemaining = getTimerInputSeconds();
  timerTotal = timerRemaining;
  if (timerTotal === 0) { timerRemaining = 300; timerTotal = 300; }
  updateTimerDisplay();
  timerDisplay.className = 'time-display';
  timerRing.className = 'ring-fg';
  timerRingWrap.classList.remove('finished');
  timerStartBtn.textContent = '▶';
  timerStartBtn.classList.remove('running');
  timerLabel.textContent = 'HAZIR';
  setTimerInputDisabled(false);
  document.getElementById('timerInputWrap').style.opacity = '1';
}
function finishTimer() {
  clearInterval(timerInterval); timerInterval = null;
  timerRunning = false;
  timerRemaining = 0;
  updateTimerDisplay();
  timerDisplay.className = 'time-display finished';
  timerRingWrap.classList.add('finished');
  timerStartBtn.textContent = '▶';
  timerStartBtn.classList.remove('running');
  timerLabel.textContent = 'TAMAMLANDI ✓';
  setTimerInputDisabled(false);
  document.getElementById('timerInputWrap').style.opacity = '1';
  playAlarm();
  sendNotification('⏱ Timer Pro', `Süre doldu! ${formatHMS(timerTotal)} tamamlandı.`);
  showToast('🎉 Süre doldu!', 3000);
  // burst
  const rect = timerRingWrap.getBoundingClientRect();
  burst(rect.left + rect.width/2, rect.top + rect.height/2, '#6c63ff');
}

timerStartBtn.addEventListener('click', () => {
  if (timerRunning) { pauseTimer(); return; }
  // Check stopwatch conflict
  if (swRunning) {
    showModal('Kronometre Çalışıyor',
      'Bir kronometre zaten aktif. Yeni bir geri sayım başlatmak istiyor musunuz?',
      [
        { label: 'İptal', primary: false },
        { label: 'Başlat', primary: true, fn: () => doStartTimer() }
      ]);
    return;
  }
  doStartTimer();
});
function doStartTimer() {
  timerTotal = getTimerInputSeconds();
  if (timerTotal === 0) { showToast('Lütfen bir süre girin'); return; }
  timerRemaining = timerTotal;
  setRing(timerRing, 1);
  timerDisplay.className = 'time-display';
  timerRing.className = 'ring-fg';
  timerRingWrap.classList.remove('finished');
  startTimer();
}
timerResetBtn.addEventListener('click', resetTimer);
// Input change → reset
[tHour, tMin, tSec].forEach(el => {
  el.addEventListener('change', () => { if (!timerRunning) { timerTotal = getTimerInputSeconds(); timerRemaining = timerTotal; updateTimerDisplay(); } });
});
// Init
setRing(timerRing, 1);

/* ──────────────── PRESETS ──────────────── */
let presets = JSON.parse(localStorage.getItem('timerPresets') || '[]');
if (presets.length === 0) presets = [60, 300, 600, 1800, 3600];

function savePresets() { localStorage.setItem('timerPresets', JSON.stringify(presets)); }
function renderPresets() {
  const list = document.getElementById('presetsList');
  list.innerHTML = '';
  presets.forEach((s, i) => {
    const chip = document.createElement('div');
    chip.className = 'preset-chip';
    const label = document.createElement('span');
    label.textContent = formatHMS(s);
    const del = document.createElement('span');
    del.className = 'del-preset';
    del.textContent = '✕';
    del.title = 'Sil';
    del.addEventListener('click', e => {
      e.stopPropagation();
      presets.splice(i, 1);
      savePresets(); renderPresets();
      showToast('Preset silindi');
    });
    chip.appendChild(label);
    chip.appendChild(del);
    chip.addEventListener('click', () => {
      if (timerRunning) { showToast('Önce zamanlayıcıyı durdurun'); return; }
      tHour.value = Math.floor(s/3600);
      tMin.value  = Math.floor((s%3600)/60);
      tSec.value  = s % 60;
      timerTotal = s; timerRemaining = s;
      updateTimerDisplay();
      showToast('Süre seçildi: ' + formatHMS(s));
    });
    list.appendChild(chip);
  });
}
renderPresets();

document.getElementById('addPresetBtn').addEventListener('click', () => {
  const s = getTimerInputSeconds();
  if (s === 0) { showToast('Önce bir süre girin'); return; }
  if (presets.includes(s)) { showToast('Bu süre zaten kayıtlı'); return; }
  presets.push(s);
  presets.sort((a,b) => a-b);
  savePresets(); renderPresets();
  showToast('Kaydedildi: ' + formatHMS(s));
});

/* ──────────────────────────────────────────
   ════════════ STOPWATCH LOGIC ════════════
   ────────────────────────────────────────── */
let swElapsed = 0, swRunning = false, swInterval = null;
let swLapStart = 0, swLaps = [];

const swDisplay = document.getElementById('swDisplay');
const swMs      = document.getElementById('swMs');
const swLabel   = document.getElementById('swLabel');
const swRing    = document.getElementById('swRing');
const swStartBtn = document.getElementById('swStartBtn');
const swLapBtn   = document.getElementById('swLapBtn');
const swResetBtn = document.getElementById('swResetBtn');

function formatMMSS(ms) {
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function updateSwDisplay() {
  swDisplay.textContent = formatMMSS(swElapsed);
  swMs.textContent = '.' + String(Math.floor((swElapsed%1000)/10)).padStart(2,'0');
  const pct = (swElapsed % 60000) / 60000;
  setRing(swRing, pct);
}

let swLastTick = null;
function startSw() {
  swLastTick = Date.now();
  swInterval = setInterval(() => {
    if (document.hidden) return;
    const now = Date.now();
    swElapsed += now - swLastTick;
    swLastTick = now;
    updateSwDisplay();
  }, 30);
  swRunning = true;
  swStartBtn.textContent = '⏸';
  swStartBtn.classList.add('running');
  swLabel.textContent = 'ÇALIŞIYOR';
  swLapBtn.style.opacity = '1';
}
function pauseSw() {
  clearInterval(swInterval); swInterval = null;
  swRunning = false;
  swStartBtn.textContent = '▶';
  swStartBtn.classList.remove('running');
  swLabel.textContent = 'DURAKLATILDI';
}
function resetSw() {
  clearInterval(swInterval); swInterval = null;
  swRunning = false; swElapsed = 0; swLapStart = 0; swLaps = [];
  updateSwDisplay();
  swDisplay.className = 'time-display';
  swStartBtn.textContent = '▶';
  swStartBtn.classList.remove('running');
  swLabel.textContent = 'HAZIR';
  swLapBtn.style.opacity = '0.4';
  document.getElementById('lapsList').innerHTML = '';
}

swStartBtn.addEventListener('click', () => {
  if (swRunning) { pauseSw(); return; }
  // Check timer conflict
  if (timerRunning) {
    showModal('Geri Sayım Çalışıyor',
      'Bir geri sayım zaten aktif. Kronometre başlatmak istiyor musunuz?',
      [
        { label: 'İptal', primary: false },
        { label: 'Başlat', primary: true, fn: () => startSw() }
      ]);
    return;
  }
  startSw();
});

swResetBtn.addEventListener('click', () => {
  if (swRunning) {
    showModal('Kronoyu Sıfırla', 'Kronometre sıfırlanacak. Emin misiniz?',
      [{ label: 'İptal', primary: false }, { label: 'Sıfırla', primary: true, fn: resetSw }]);
  } else { resetSw(); }
});

swLapBtn.addEventListener('click', () => {
  if (!swRunning) return;
  const lapTime = swElapsed - swLapStart;
  swLaps.push(lapTime);
  swLapStart = swElapsed;
  renderLaps();
  // mini burst
  const rect = swRing.getBoundingClientRect();
  burst(rect.left + rect.width/2, rect.top + rect.height/2, '#43e97b');
});

function renderLaps() {
  const list = document.getElementById('lapsList');
  if (!swLaps.length) { list.innerHTML = ''; return; }
  const minLap = Math.min(...swLaps), maxLap = Math.max(...swLaps);
  list.innerHTML = '';
  [...swLaps].reverse().forEach((lap, ri) => {
    const i = swLaps.length - 1 - ri;
    const item = document.createElement('div');
    item.className = 'lap-item';
    if (swLaps.length > 1) {
      if (lap === minLap) item.classList.add('best');
      if (lap === maxLap) item.classList.add('worst');
    }
    item.innerHTML = `
      <span class="lap-num">Tur ${i+1}</span>
      <span>${formatMMSS(lap)}.${String(Math.floor((lap%1000)/10)).padStart(2,'0')}</span>
      <span class="lap-split">${formatMMSS(swLaps.slice(0,i+1).reduce((a,b)=>a+b,0))}</span>`;
    list.appendChild(item);
  });
}

// Init
swLapBtn.style.opacity = '0.4';
setRing(swRing, 0);
updateSwDisplay();
updateTimerDisplay();
</script>
</body>
